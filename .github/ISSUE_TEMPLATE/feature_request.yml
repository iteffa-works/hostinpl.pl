name: Feature Request
description: Suggest a feature for HOSTINPL
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        See [ROADMAP.md](https://github.com/iteffa-works/hostinpl.pl/blob/main/ROADMAP.md) before submitting.

  - type: textarea
    id: problem
    attributes:
      label: Problem / use case
      description: What problem does this solve?
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered

  - type: checkboxes
    id: willing
    attributes:
      label: Contribution
      options:
        - label: I am willing to submit a PR for this feature
          required: false
